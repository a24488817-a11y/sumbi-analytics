id = "stock-dashboard"
title = "KRX Stock Dashboard"
kind = "web"
previewPath = "/stock-dashboard/"
version = "1.0.0"

[[services]]
name = "web"
localPort = 5000
paths = ["/stock-dashboard"]

[services.devServer]
